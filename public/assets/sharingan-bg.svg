<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" opacity="0.15">
  <defs>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b0000" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#c62828" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c62828" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 外环 -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#c62828" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#c62828" stroke-width="1.5" opacity="0.4"/>
  <!-- 虹膜 -->
  <circle cx="200" cy="200" r="120" fill="url(#iris)"/>
  <!-- 三勾玉 -->
  <g transform="translate(200,200)">
    <g transform="rotate(0)">
      <path d="M 0,-70 A 30,30 0 1,1 20,-65 Q 10,-40 0,-70" fill="#1a0000" opacity="0.9"/>
    </g>
    <g transform="rotate(120)">
      <path d="M 0,-70 A 30,30 0 1,1 20,-65 Q 10,-40 0,-70" fill="#1a0000" opacity="0.9"/>
    </g>
    <g transform="rotate(240)">
      <path d="M 0,-70 A 30,30 0 1,1 20,-65 Q 10,-40 0,-70" fill="#1a0000" opacity="0.9"/>
    </g>
  </g>
  <!-- 瞳孔 -->
  <circle cx="200" cy="200" r="20" fill="#1a0000"/>
  <circle cx="200" cy="200" r="8" fill="#c62828" opacity="0.6"/>
</svg>
