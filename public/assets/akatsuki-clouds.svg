<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.06">
  <defs>
    <clipPath id="cloud-clip">
      <rect width="200" height="200"/>
    </clipPath>
  </defs>
  <g clip-path="url(#cloud-clip)">
    <!-- 晓组织红云纹样 -->
    <g fill="#c62828" opacity="0.8">
      <!-- 云1 -->
      <path d="M 30,60 Q 20,40 40,35 Q 55,20 70,35 Q 85,25 90,40 Q 100,35 100,50 Q 105,60 90,65 Q 80,75 60,70 Q 40,75 30,60 Z"/>
      <!-- 云2 -->
      <path d="M 120,140 Q 110,120 130,115 Q 145,100 160,115 Q 175,105 180,120 Q 190,115 190,130 Q 195,140 180,145 Q 170,155 150,150 Q 130,155 120,140 Z"/>
      <!-- 云3（小） -->
      <path d="M 60,170 Q 55,160 65,157 Q 72,150 80,157 Q 88,152 90,160 Q 95,157 95,165 Q 97,170 88,173 Q 82,178 72,175 Q 62,178 60,170 Z"/>
    </g>
    <!-- 螺旋纹 -->
    <g fill="none" stroke="#c62828" stroke-width="0.8" opacity="0.4">
      <path d="M 50,50 Q 55,45 60,50 Q 65,55 60,60 Q 55,65 50,60 Q 45,55 50,50"/>
      <path d="M 150,80 Q 155,75 160,80 Q 165,85 160,90 Q 155,95 150,90 Q 145,85 150,80"/>
      <path d="M 100,120 Q 105,115 110,120 Q 115,125 110,130 Q 105,135 100,130 Q 95,125 100,120"/>
    </g>
  </g>
</svg>
